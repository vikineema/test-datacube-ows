services:
  db:
    image: kartoza/postgis:latest
    ports:
        - ${POSTGRES_PORT}:5432
    environment:
        - POSTGRES_DB=${POSTGRES_DB}
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASS=${POSTGRES_PASS}
        - ALLOW_IP_RANGE=${ALLOW_IP_RANGE}
        - POSTGRES_MULTIPLE_EXTENSIONS=${POSTGRES_MULTIPLE_EXTENSIONS}
        - FORCE_SSL=TRUE
    restart: on-failure
    healthcheck:
      test: "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER}"
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 1m

  jupyter:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      # $ODC_{environment name}_{option name}
      - ODC_DEFAULT_INDEX_DRIVER=postgis
      # Database connection URL: postgresql://<username>:<password>@<hostname>:<port>/<database>
      - ODC_DEFAULT_DB_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASS}@db:5432/${POSTGRES_DB}"
      - GS_NO_SIGN_REQUEST=YES
      - AWS_NO_SIGN_REQUEST=YES
      - AWS_DEFAULT_REGION=af-south-1
      - JUPYTER_PORT=${JUPYTER_PORT}
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
    ports:
      - ${JUPYTER_PORT}:${JUPYTER_PORT}
    volumes:
      - ./products:/home/jovyan/products
      - ./notebooks:/home/jovyan/notebooks
    depends_on:
        db:
          condition: service_healthy
    restart: always
